name: NEXERA Self-Improve

# Daily autonomous improvement loop. Generates code with an open-source model,
# opens PRs (never merges to your default branch without approval). Vercel
# auto-deploys once YOU merge. Admin (you) stays in control.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: # manual "Run workflow" button
    inputs:
      live:
        description: "Open real PRs (1) or dry-run (0)"
        default: "1"
      automerge:
        description: "Auto-merge LOW-risk PRs (1) — leave 0 to review everything"
        default: "0"

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "nexera-evolution[bot]"
          git config user.email "evolution@nexera.local"

      - name: Run self-improve loop
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVOLUTION_LIVE: ${{ github.event.inputs.live || '1' }}
          EVOLUTION_AUTOMERGE: ${{ github.event.inputs.automerge || '0' }}
          # Optional: report runs to the live site so /dashboard/evolution updates.
          EVOLUTION_LOG_URL: ${{ secrets.EVOLUTION_LOG_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/self-improve.mjs

      - name: Commit evolution log
        if: always()
        run: |
          git checkout -- . 2>/dev/null || true
          if [ -n "$(git status --porcelain scripts/evolution-log.md)" ]; then
            git add scripts/evolution-log.md
            git commit -m "chore(evolution): update self-improve log [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || true
          fi

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-improve-report
          path: scripts/.last-run.json
          if-no-files-found: ignore
